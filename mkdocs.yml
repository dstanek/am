site_name: am — Agent Manager
site_description: Isolated environments for AI coding agents. Each session gets its own branch, a dedicated tmux window, and optional container isolation.
site_url: https://dstanek.github.io/agent-manager/
repo_url: https://github.com/dstanek/agent-manager
repo_name: dstanek/agent-manager
edit_uri: ""

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      scheme: default
      primary: deep-orange
      accent: amber
      toggle:
        icon: material/brightness-auto
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep-orange
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
  logo: assets/am-gear-192x192.png
  favicon: assets/am-gear-192x192.png
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Concepts: concepts.md
    - Quick Start: getting-started/quick-start.md
  - Guides:
    - Claude Code: guides/claude-code.md
    - GitHub Copilot: guides/github-copilot.md
  - Reference:
    - Commands: reference/commands.md
    - Configuration: reference/configuration.md
    - Commit Trailers: reference/commit-trailers.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
